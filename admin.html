<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Admin - North Design</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background-color: #0b071a; color: #fff; font-family: 'Inter', sans-serif; }
        .admin-card { background: #150f2e; border: 1px solid #9d8df1; border-radius: 12px; padding: 30px; margin-bottom: 20px;}
        .btn-north { background: #9d8df1; color: #000; font-weight: bold; border: none; }
        .btn-north:hover { background: #b8aeff; }
        #login-container { margin-top: 15vh; max-width: 400px; }
        
        /* O GRID VISUAL (Cópia do Frontend para você ver como vai ficar) */
        .visual-grid { 
            display: flex; flex-wrap: wrap; gap: 15px; padding: 20px; 
            background: #0a0715; border-radius: 8px; border: 1px dashed rgba(157, 141, 241, 0.5); 
            min-height: 250px; align-items: flex-start;
        }
        
        .admin-item { 
            position: relative; cursor: grab; transition: width 0.3s ease;
            background: #1a123a; border-radius: 8px; display: flex; align-items: center; justify-content: center;
        }
        .admin-item:active { cursor: grabbing; opacity: 0.8; }
        .admin-item img { width: 100%; height: auto; object-fit: cover; border-radius: 8px; border: 2px solid transparent; }
        .admin-item:hover img { border-color: #9d8df1; }
        
        /* Os botões que aparecem em cima da foto quando passa o mouse */
        .item-controls { position: absolute; top: 10px; right: 10px; display: flex; gap: 5px; opacity: 0; transition: 0.2s; }
        .admin-item:hover .item-controls { opacity: 1; }
        .btn-sm-admin { background: rgba(0,0,0,0.8); color: white; border: 1px solid #9d8df1; padding: 5px 10px; border-radius: 5px; cursor: pointer; font-size: 0.8rem; }
        .btn-sm-admin:hover { background: #9d8df1; color: black; }
        
        /* A Matemática dos Tamanhos */
        .item-feed { width: calc(50% - 7.5px); }
        .item-stories { width: calc(33.333% - 10px); }
        .item-carrossel { width: 100%; }

        .loading-text { color: #9d8df1; font-weight: bold; padding: 50px 0; text-align: center; width: 100%; }
    </style>
</head>
<body>

<div id="login-container" class="container">
    <div class="admin-card text-center">
        <img src="img/logo/sua-logo.png" alt="North Design" style="max-height: 50px; margin-bottom: 20px;" onerror="this.style.display='none'">
        <h3 class="mb-4" style="color: #9d8df1;">Acesso Restrito</h3>
        <input type="email" id="email" class="form-control bg-dark text-white mb-3" placeholder="E-mail admin">
        <input type="password" id="senha" class="form-control bg-dark text-white mb-3" placeholder="Senha">
        <button id="btn-login" class="btn btn-north w-100 mb-3">Entrar no Painel</button>
        <p id="login-erro" class="text-danger" style="display: none;">Acesso negado.</p>
        <a href="index.html" class="text-muted">Voltar ao site</a>
    </div>
</div>

<div id="admin-container" class="container mt-4" style="display: none;">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2>Gerenciador de Projetos</h2>
        <div>
            <button id="btn-logout" class="btn btn-outline-danger me-2">Sair</button>
            <a href="index.html" class="btn btn-outline-light">Ver Site</a>
        </div>
    </div>

    <div class="admin-card">
        
        <div class="input-group mb-4">
            <input type="text" id="load-id" class="form-control bg-dark text-white" placeholder="ID para editar (ex: estilounico)">
            <button id="btn-load" class="btn btn-outline-info">Carregar para Editar</button>
        </div>

        <hr class="border-secondary my-4">

        <h4 class="mb-3 text-primary">Informações do Projeto</h4>
        <div class="row mb-3">
            <div class="col-md-4">
                <label>ID do Projeto (Novo ou Editado)</label>
                <input type="text" id="proj-id" class="form-control bg-dark text-white" placeholder="Sem espaços (ex: loja1)">
            </div>
            <div class="col-md-8">
                <label>Título do Modal</label>
                <input type="text" id="proj-titulo" class="form-control bg-dark text-white" placeholder="Ex: Loja de Roupas - Identidade Visual">
            </div>
        </div>

        <hr class="border-secondary my-4">

        <div class="d-flex justify-content-between align-items-center mb-3">
            <h5>Grade de Fotos <small class="text-muted">(Arraste para mover. Clique em "Tamanho" para ajustar)</small></h5>
            
            <input type="file" id="file-upload" accept="image/*" multiple class="d-none">
            <button id="btn-trigger-upload" class="btn btn-light"><i class="fas fa-camera"></i> Anexar Fotos</button>
        </div>
        
        <div id="visual-grid" class="visual-grid mb-4">
            <p class="text-muted w-100 text-center" id="empty-msg" style="margin-top: 80px;">Nenhuma foto. Clique em Anexar Fotos.</p>
        </div>
        
        <div class="d-grid mt-5">
            <button id="btn-salvar" class="btn btn-north btn-lg"><i class="fas fa-cloud-upload-alt"></i> Publicar Projeto no Site</button>
        </div>
        <div id="status-msg" class="text-center mt-3 text-success" style="display:none; font-weight: bold; font-size: 1.2rem;">Projeto Publicado com Sucesso!</div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
    import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";
    import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
    // Nova importação: Firebase Storage para upload de arquivos
    import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-storage.js";

    // SUAS CHAVES
   const firebaseConfig = {
  apiKey: "AIzaSyB3lBK0OuQiwM5trQcP1iQrPqTUdCJGNgM",
  authDomain: "northdesignv2.firebaseapp.com",
  projectId: "northdesignv2",
  storageBucket: "northdesignv2.firebasestorage.app",
  messagingSenderId: "357871231893",
  appId: "1:357871231893:web:f44690a3e42cd2daa9cc9c",
  measurementId: "G-5HTYRY74VG"
};

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);
    const storage = getStorage(app); // Inicia o Storage

    // ---------------------------------------------------------
    // LOGIN E AUTENTICAÇÃO
    // ---------------------------------------------------------
    onAuthStateChanged(auth, (user) => {
        if (user) {
            document.getElementById('login-container').style.display = 'none';
            document.getElementById('admin-container').style.display = 'block';
        } else {
            document.getElementById('login-container').style.display = 'block';
            document.getElementById('admin-container').style.display = 'none';
        }
    });

    document.getElementById('btn-login').addEventListener('click', () => {
        signInWithEmailAndPassword(auth, document.getElementById('email').value, document.getElementById('senha').value)
            .catch(() => document.getElementById('login-erro').style.display = 'block');
    });

    document.getElementById('btn-logout').addEventListener('click', () => signOut(auth));

    // ---------------------------------------------------------
    // LÓGICA DO GRID VISUAL E DRAG & DROP
    // ---------------------------------------------------------
    const visualGrid = document.getElementById('visual-grid');
    const emptyMsg = document.getElementById('empty-msg');
    
    // Ativa o arrastar e soltar visual
    new Sortable(visualGrid, { 
        animation: 150, 
        ghostClass: 'bg-secondary' 
    });

    // Função que cria o "card" da foto na tela
    function adicionarFotoNoGrid(url, formato) {
        if(emptyMsg) emptyMsg.style.display = 'none';

        const item = document.createElement('div');
        // Adiciona a classe visual baseada no formato escolhido
        item.className = `admin-item item-${formato}`;
        item.dataset.formato = formato; // Salva o formato na memória do elemento
        item.dataset.url = url; // Salva a URL

        item.innerHTML = `
            <img src="${url}">
            <div class="item-controls">
                <button class="btn-sm-admin btn-size" title="Mudar Tamanho"><i class="fas fa-compress-alt"></i> Tamanho</button>
                <button class="btn-sm-admin btn-delete text-danger" title="Excluir"><i class="fas fa-trash"></i></button>
            </div>
        `;

        // Botão de Excluir
        item.querySelector('.btn-delete').addEventListener('click', () => {
            item.remove();
            if(visualGrid.children.length === 1) emptyMsg.style.display = 'block'; // O 1 é a mensagem vazia escondida
        });

        // O Segredo: O botão de Tamanho que rotaciona (Feed -> Stories -> Carrossel)
        item.querySelector('.btn-size').addEventListener('click', () => {
            let formAtual = item.dataset.formato;
            item.classList.remove(`item-${formAtual}`);
            
            let novoFormato = '';
            if(formAtual === 'feed') novoFormato = 'stories';
            else if(formAtual === 'stories') novoFormato = 'carrossel';
            else novoFormato = 'feed';

            item.classList.add(`item-${novoFormato}`);
            item.dataset.formato = novoFormato;
        });

        visualGrid.appendChild(item);
    }

    // ---------------------------------------------------------
    // SISTEMA DE UPLOAD DE FOTOS (Dispositivo -> Firebase)
    // ---------------------------------------------------------
    document.getElementById('btn-trigger-upload').addEventListener('click', () => {
        document.getElementById('file-upload').click();
    });

    document.getElementById('file-upload').addEventListener('change', async (e) => {
        const files = e.target.files;
        if(files.length === 0) return;
        
        if(emptyMsg) emptyMsg.style.display = 'none';

        // Desativa o botão enquanto sobe as fotos
        const btnUpload = document.getElementById('btn-trigger-upload');
        btnUpload.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Enviando...';
        btnUpload.disabled = true;

        for(let file of files) {
            try {
                // Cria um nome único para a foto
                const nomeArquivo = `projetos/${Date.now()}_${file.name}`;
                const storageRef = ref(storage, nomeArquivo);
                
                // Envia para o Firebase
                await uploadBytes(storageRef, file);
                
                // Pega o Link da foto salva
                const url = await getDownloadURL(storageRef);
                
                // Adiciona na grade (por padrão como Feed)
                adicionarFotoNoGrid(url, 'feed');
            } catch (error) {
                console.error("Erro no upload:", error);
                alert("Erro ao enviar imagem. Verificou as regras do Storage?");
            }
        }

        btnUpload.innerHTML = '<i class="fas fa-camera"></i> Anexar Fotos';
        btnUpload.disabled = false;
        e.target.value = ''; // Limpa o input
    });

    // ---------------------------------------------------------
    // CARREGAR UM PROJETO EXISTENTE PARA EDITAR
    // ---------------------------------------------------------
    document.getElementById('btn-load').addEventListener('click', async () => {
        const loadId = document.getElementById('load-id').value.trim();
        if(!loadId) return;

        const docRef = doc(db, "projetos", loadId);
        const docSnap = await getDoc(docRef);

        if (docSnap.exists()) {
            const dados = docSnap.data();
            document.getElementById('proj-id').value = loadId;
            document.getElementById('proj-titulo').value = dados.titulo;
            
            // Limpa a grade e carrega as fotos antigas
            visualGrid.innerHTML = '';
            dados.imagens.forEach(img => adicionarFotoNoGrid(img.url, img.formato));
            
            alert("Projeto carregado! Você pode alterar os tamanhos, arrastar ou deletar fotos.");
        } else {
            alert("Nenhum projeto encontrado com este ID.");
        }
    });

    // ---------------------------------------------------------
    // SALVAR TUDO NO BANCO DE DADOS
    // ---------------------------------------------------------
    document.getElementById('btn-salvar').addEventListener('click', async () => {
        const idProjeto = document.getElementById('proj-id').value.trim();
        const tituloProjeto = document.getElementById('proj-titulo').value;
        
        if(!idProjeto || !tituloProjeto) { alert('Preencha o ID e Título!'); return; }

        // Puxa as fotos exatamente na ordem que estão no visual
        const imagens = [];
        document.querySelectorAll('.admin-item').forEach(item => {
            imagens.push({ 
                url: item.dataset.url, 
                formato: item.dataset.formato 
            });
        });

        try {
            document.getElementById('btn-salvar').innerHTML = '<i class="fas fa-spinner fa-spin"></i> Publicando...';
            
            await setDoc(doc(db, "projetos", idProjeto), { 
                titulo: tituloProjeto, 
                imagens: imagens 
            });
            
            document.getElementById('btn-salvar').innerHTML = '<i class="fas fa-cloud-upload-alt"></i> Publicar Projeto no Site';
            document.getElementById('status-msg').style.display = 'block';
            setTimeout(() => { document.getElementById('status-msg').style.display = 'none'; }, 4000);
        } catch (e) {
            console.error(e);
            alert('Erro ao salvar os dados.');
        }
    });
</script>
</body>
</html>
